const DEF={totalTrucks:13,payload:40,batteryCapacity:282,consEmpty:2.0,consLoaded:3.2,spdEmpty:30,spdLoaded:20,socMin:20,socMax:80,paUnit:90,distEmpty:4,distLoaded:4,numLoaders:1,tLoad:12,tAntriLoader:0,numDumps:1,tDump:5,tAntriDump:0,tSwap:5,tBattCharge:45,stationsAtLP:0,stationsAtMID:0,stationsAtDP:2,battPerStation:8,midKm:2,socWarn:30,shiftH:24,staggerMin:0,shiftChangeDur:30,restBreakDur:60,idleConsKwMin:0.05};

function buildBreaks(p,days){const b=[];for(let d=0;d<days;d++){const o=d*1440;b.push({t:o+720,dur:p.shiftChangeDur,type:"shift_change"});b.push({t:o+360,dur:p.restBreakDur,type:"rest_break"});b.push({t:o+1080,dur:p.restBreakDur,type:"rest_break"});if(d>0)b.push({t:o,dur:p.shiftChangeDur,type:"shift_change"})}return b.filter(x=>x.dur>0).sort((a,b)=>a.t-b.t)}

function PQ(){const h=[];const sw=(i,j)=>{[h[i],h[j]]=[h[j],h[i]]};const up=i=>{while(i>0){const p=(i-1)>>1;if(h[p].t>h[i].t||(h[p].t===h[i].t&&h[p].tid>h[i].tid)){sw(p,i);i=p}else break}};const dn=i=>{const n=h.length;while(true){let s=i;const l=2*i+1,r=2*i+2;if(l<n&&(h[l].t<h[s].t||(h[l].t===h[s].t&&h[l].tid<h[s].tid)))s=l;if(r<n&&(h[r].t<h[s].t||(h[r].t===h[s].t&&h[r].tid<h[s].tid)))s=r;if(s===i)break;sw(i,s);i=s}};return{push(e){h.push(e);up(h.length-1)},pop(){if(!h.length)return null;const t=h[0];const l=h.pop();if(h.length){h[0]=l;dn(0)}return t},get size(){return h.length}}}

function runSim(p,days=1){
  /* ===== INPUT VALIDATION & CLAMP ===== prevent infinite loops & crashes ===== */
  p={...p};
  p.totalTrucks=Math.max(1,Math.min(50,Math.floor(p.totalTrucks||1)));
  p.shiftH=Math.max(1,p.shiftH||24);
  p.numLoaders=Math.max(1,Math.floor(p.numLoaders||1));
  p.numDumps=Math.max(1,Math.floor(p.numDumps||1));
  p.distEmpty=Math.max(0.1,p.distEmpty||0.1);
  p.distLoaded=Math.max(0.1,p.distLoaded||0.1);
  p.spdEmpty=Math.max(1,p.spdEmpty||30);
  p.spdLoaded=Math.max(1,p.spdLoaded||20);
  p.tLoad=Math.max(0.5,p.tLoad||0.5);
  p.tDump=Math.max(0.5,p.tDump||0.5);
  p.tSwap=Math.max(0.5,p.tSwap||0.5);
  p.tBattCharge=Math.max(1,p.tBattCharge||1);
  p.battPerStation=Math.max(1,Math.floor(p.battPerStation||1));
  p.batteryCapacity=Math.max(1,p.batteryCapacity||1);
  p.consEmpty=Math.max(0.01,p.consEmpty||0.01);
  p.consLoaded=Math.max(0.01,p.consLoaded||0.01);
  if(p.socMax<=p.socMin)p.socMax=p.socMin+10;
  const DAY=p.shiftH*60,TOTAL=DAY*days;
  const tE=(p.distEmpty/p.spdEmpty)*60,tL=(p.distLoaded/p.spdLoaded)*60;
  const eE=p.consEmpty*p.distEmpty,eL=p.consLoaded*p.distLoaded,ePT=eE+eL;
  const idleKw=p.idleConsKwMin;
  const tLoadEff=p.tLoad+(p.tAntriLoader||0),tDumpEff=p.tDump+(p.tAntriDump||0);
  const cyc=Math.max(1,tE+tLoadEff+tL+tDumpEff); /* cyc>=1 menit hindari infinite loop */
  const stations={
    LP:Array.from({length:p.stationsAtLP||0},()=>({busyUntil:0,totalBusy:0,sessions:[]})),
    MID:Array.from({length:p.stationsAtMID||0},()=>({busyUntil:0,totalBusy:0,sessions:[]})),
    DP:Array.from({length:p.stationsAtDP||0},()=>({busyUntil:0,totalBusy:0,sessions:[]})),
  };
  if(stations.LP.length+stations.MID.length+stations.DP.length===0){stations.DP=[{busyUntil:0,totalBusy:0,sessions:[]}]}
  const locKm={LP:0,MID:Math.max(0,Math.min(p.distLoaded,p.midKm||p.distLoaded/2)),DP:p.distLoaded};

  const batt={LP:[],MID:[],DP:[]};

  let battDenied=0,battWait=0;
  /* Loader/dump pool */
  const lB=new Float64Array(p.numLoaders),lBu=new Float64Array(p.numLoaders),dB=new Float64Array(p.numDumps),dBu=new Float64Array(p.numDumps);
  const lTL=Array.from({length:p.numLoaders},()=>[]),dTL=Array.from({length:p.numDumps},()=>[]);
  const brks=buildBreaks(p,days);let bpd=0;for(const b of buildBreaks(p,1))bpd+=b.dur;
  const EFF=Math.max(0,(DAY*(p.paUnit/100)-bpd))*days;
  const T=[];
  for(let i=0;i<p.totalTrucks;i++)T.push({id:i+1,soc:p.socMax,trips:0,ton:0,swaps:0,sw:0,lw:0,dw:0,st:0,pt:0,bt:0,rt:0,dtTime:0,idleE:0,detKm:0,bw:0,denied:0,log:[],swapsByLoc:{LP:0,MID:0,DP:0},done:false});
  const pq=PQ();
  for(let i=0;i<p.totalTrucks;i++){const st=i*p.staggerMin;if(st>0)T[i].log.push({e:"idle",t0:0,d:st});pq.push({t:st,tid:i,type:'go'})}

  /* doWork: aktivitas kerja durasi tetap, pause kalau kena break */
  const doWork=(tr,t,duration,eventName,extraProps)=>{
    let cur=t,rem=Math.max(0,duration),workMinutes=0,guard=0;
    while(rem>0.01 && cur<TOTAL && guard<200){
      guard++;
      const prevCur=cur;
      const active=brks.find(b=>b.t<=cur && b.t+b.dur>cur && b.dur>0);
      if(active){const bEnd=Math.min(active.t+active.dur,TOTAL);const bDur=bEnd-cur;if(bDur>0.01){tr.log.push({e:active.type,t0:cur,d:bDur});if(active.type==="shift_change")tr.bt+=bDur;else if(active.type==="rest_break")tr.rt+=bDur}cur=Math.max(bEnd,cur+0.01);continue}
      const nxt=brks.find(b=>b.t>=cur && b.t<cur+rem && b.dur>0);
      if(!nxt){const dEnd=Math.min(cur+rem,TOTAL);const d=dEnd-cur;if(d>0.01){tr.log.push({e:eventName,t0:cur,d,...(extraProps||{})});workMinutes+=d}cur=dEnd;rem=0}
      else{const part=nxt.t-cur;if(part>0.01){tr.log.push({e:eventName,t0:cur,d:part,...(extraProps||{})});workMinutes+=part;cur=nxt.t;rem-=part}else{cur=nxt.t+0.01}}

    }

  };

  const waitUntil=(tr,t,target,eventName,extraProps)=>{
    let cur=t,waitMinutes=0,guard=0;
    while(cur<target && cur<TOTAL && guard<200){
      guard++;
      const prevCur=cur;
      const active=brks.find(b=>b.t<=cur && b.t+b.dur>cur && b.dur>0);
      if(active){const bEnd=Math.min(active.t+active.dur,TOTAL);const bDur=bEnd-cur;if(bDur>0.01){tr.log.push({e:active.type,t0:cur,d:bDur});if(active.type==="shift_change")tr.bt+=bDur;else if(active.type==="rest_break")tr.rt+=bDur}cur=Math.max(bEnd,cur+0.01);continue}

      if(cur<=prevCur){cur=prevCur+0.01}
    }
    return{newTime:cur,waitMinutes};
  };

  /* Pick best swap station location */
  const pickStation=(now,phase,onRouteSet)=>{
    const out=[];
    ['LP','MID','DP'].forEach(loc=>{
      if(stations[loc].length===0)return;
      let bi=0;for(let i=1;i<stations[loc].length;i++)if(stations[loc][i].busyUntil<stations[loc][bi].busyUntil)bi=i;

    });

  };

  /* goSwap: drive detour if needed, queue at station, swap battery */
  const goSwap=(tr,now,phase,onRouteSet)=>{
    const pick=pickStation(now,phase,onRouteSet);

    if(pick.detourMin>0&&!pick.onRoute){

    const swapStart=Math.max(t,slot.busyUntil);

    if(swapStart>t+0.5){
      const wq=waitUntil(tr,t,swapStart,"antri_swap",{loc:pick.loc,si:pick.idx});

    }

    /* Try to get ready battery */
    let chosenBatt=null;
    for(const b of batt[pick.loc]){
      if(b.ready||b.readyAt<=t){chosenBatt=b;break;}
    }
    if(!chosenBatt){
      /* No battery ready */
      if(!batt[pick.loc] || batt[pick.loc].length===0){
        /* Empty battery pool at this location — graceful fallback: virtual ready battery */
        chosenBatt={stIdx:pick.idx,ready:true,readyAt:t,id:`${pick.loc}-virtual`};
      } else {
        /* Find earliest, wait for it */
        let earliest=batt[pick.loc][0];
        for(const b of batt[pick.loc])if(b.readyAt<earliest.readyAt)earliest=b;
        const battReadyAt=earliest.readyAt;
        if(battReadyAt>t){
          battDenied++;tr.denied++;
          const ww=waitUntil(tr,t,Math.min(battReadyAt,TOTAL),"antri_swap",{loc:pick.loc,si:pick.idx,waitingBatt:true});
          tr.bw+=ww.waitMinutes;battWait+=ww.waitMinutes;

        }
        chosenBatt=earliest;
      }
    }
    if(t>=TOTAL){tr.done=true;return{newTime:t,didSwap:false}}

    const wSwap=doWork(tr,t,p.tSwap,"swapping",{loc:pick.loc,si:pick.idx});
    if(t+p.tSwap>TOTAL){tr.done=true;return{newTime:wSwap.newTime,didSwap:false}}
    slot.busyUntil=wSwap.newTime;slot.totalBusy+=wSwap.workMinutes;slot.sessions.push({truck:tr.id,start:t,end:wSwap.newTime});
    /* Mark this battery as charging — needs tBattCharge time to be ready again */
    chosenBatt.ready=false;chosenBatt.readyAt=wSwap.newTime+p.tBattCharge;
    tr.soc=p.socMax;tr.swaps++;tr.st+=wSwap.workMinutes;tr.swapsByLoc[pick.loc]++;
    let tA=wSwap.newTime;
    if(pick.detourMin>0&&!pick.onRoute){
      tr.log.push({e:"detour_swap",t0:tA,d:pick.detourMin,locFrom:pick.loc});
      tr.dtTime+=pick.detourMin;const det=(pick.km*p.consEmpty/p.batteryCapacity)*100;tr.soc-=det;tr.detKm+=pick.km;tA+=pick.detourMin;
    }
    return{newTime:tA,didSwap:true,pickedLoc:pick.loc};
  };

  /* ===== Cycle flow starts at LP (loading) ===== */
  const midKm=locKm.MID;
  const distLPtoMid=midKm,distMidToDP=Math.max(0,p.distLoaded-midKm);
  const distToMidFromDP=p.distEmpty>0?Math.max(0,Math.min(p.distEmpty,p.distEmpty*(p.distLoaded-midKm)/Math.max(0.01,p.distLoaded))):0;
  const distMidToLP=Math.max(0,p.distEmpty-distToMidFromDP);
  const sLP_MID=(p.consLoaded*distLPtoMid/p.batteryCapacity)*100;
  const sMID_DP=(p.consLoaded*distMidToDP/p.batteryCapacity)*100;
  const sDP_MID=(p.consEmpty*distToMidFromDP/p.batteryCapacity)*100;
  const sMID_LP=(p.consEmpty*distMidToLP/p.batteryCapacity)*100;
  const sL_full=(eL/p.batteryCapacity)*100;
  const sE_full=(eE/p.batteryCapacity)*100;

  let sf=0;const MX=p.totalTrucks*days*600;
  const lastTime=new Array(p.totalTrucks).fill(-1);
  const stuckCount=new Array(p.totalTrucks).fill(0);

    if(now<=lastTime[ev.tid]+0.5){stuckCount[ev.tid]++;if(stuckCount[ev.tid]>3){tr.done=true;continue}}else{stuckCount[ev.tid]=0}

    const{nt:n1,logs:bL}=advBreaks(now,brks,TOTAL);for(const bl of bL){tr.log.push(bl);if(bl.e==="shift_change")tr.bt+=bl.d;if(bl.e==="rest_break")tr.rt+=bl.d}now=n1;if(now>=TOTAL){tr.done=true;continue}
    if(now+cyc>TOTAL){const r=TOTAL-now;if(r>0.5)tr.log.push({e:"idle",t0:now,d:r});tr.done=true;continue}

    /* Step 1: Loader queue + Loading */
    let bl2=0;for(let l=1;l<p.numLoaders;l++)if(lB[l]<lB[bl2])bl2=l;
    const ls=Math.max(cur,lB[bl2]);
    if(ls>cur+0.5){const wq=waitUntil(tr,cur,ls,"antri_loader",{li:bl2});tr.lw+=wq.waitMinutes;const drain=idleKw*wq.waitMinutes;tr.idleE+=drain;tr.soc-=(drain/p.batteryCapacity)*100;cur=wq.newTime}
    const wLoad=doWork(tr,cur,tLoadEff,"loading_cpp",{li:bl2});lBu[bl2]+=wLoad.workMinutes;lTL[bl2].push({truck:tr.id,start:cur,end:wLoad.newTime});lB[bl2]=wLoad.newTime;cur=wLoad.newTime;tr.pt+=wLoad.workMinutes;

    const socAfterLPtoDP=tr.soc-sL_full;const socAfterFullCycle=socAfterLPtoDP-sE_full;
    let needSwapNow=false,needSwapAtMID=false;
    if(socAfterFullCycle<p.socMin||socAfterLPtoDP<p.socMin){
      const socAtMID=tr.soc-sLP_MID;
      if(stations.MID.length>0&&midKm>0&&midKm<p.distLoaded&&socAtMID>=p.socMin)needSwapAtMID=true;
      else if(stations.LP.length>0)needSwapNow=true;

      const t2=(distMidToDP/Math.max(0.01,p.spdLoaded))*60;
      const wh2=doWork(tr,cur,t2,"hauling_isi");cur=wh2.newTime;tr.pt+=wh2.workMinutes;tr.soc-=sMID_DP;
    } else {
      const wh=doWork(tr,cur,tL,"hauling_isi");cur=wh.newTime;tr.pt+=wh.workMinutes;tr.soc-=sL_full;
    }

    /* Step 4: Dump queue + Dumping */
    let bd=0;for(let dx=1;dx<p.numDumps;dx++)if(dB[dx]<dB[bd])bd=dx;
    const ds=Math.max(cur,dB[bd]);
    if(ds>cur+0.5){const wq=waitUntil(tr,cur,ds,"antri_dump",{di:bd});tr.dw+=wq.waitMinutes;const drain=idleKw*wq.waitMinutes;tr.idleE+=drain;tr.soc-=(drain/p.batteryCapacity)*100;cur=wq.newTime}
    const wDump=doWork(tr,cur,tDumpEff,"dumping",{di:bd});dBu[bd]+=wDump.workMinutes;dTL[bd].push({truck:tr.id,start:cur,end:wDump.newTime});dB[bd]=wDump.newTime;cur=wDump.newTime;tr.pt+=wDump.workMinutes;

    /* Step 5: Predictive check for DP→LP */
    const socAfterDPtoLP=tr.soc-sE_full;

    if(socAfterDPtoLP<p.socMin){
      const socAtMID_return=tr.soc-sDP_MID;
      if(stations.MID.length>0&&midKm>0&&midKm<p.distLoaded&&socAtMID_return>=p.socMin)needSwapAtMID_return=true;
      else if(stations.DP.length>0)needSwapDPnow=true;
      else if(stations.LP.length>0&&socAfterDPtoLP>=p.socMin){/* swap at LP later */}

function sweepMid(p,days=1){
  const dist=Math.max(0.5,p.distLoaded);const step=Math.max(0.2,dist/20);const results=[];
  const base={...p};
  if((base.stationsAtMID||0)===0){if((base.stationsAtDP||0)>0){base.stationsAtMID=1;base.stationsAtDP=Math.max(0,base.stationsAtDP-1)}else if((base.stationsAtLP||0)>0){base.stationsAtMID=1;base.stationsAtLP=Math.max(0,base.stationsAtLP-1)}else base.stationsAtMID=1}
  for(let km=0;km<=dist;km+=step){const r=runSim({...base,midKm:+km.toFixed(2)},days);results.push({km:+km.toFixed(2),tons:r.totTon,trips:r.totTrips,UA:r.UA,detKm:r.totDet,sw:r.totSW,midUtil:r.locSum.MID.avgUtil,midSess:r.locSum.MID.sessions,denied:r.battDenied})}
  let best=results[0];for(const r of results){const score=r.tons-r.detKm*p.consLoaded*1000;const bScore=best.tons-best.detKm*p.consLoaded*1000;if(score>bScore)best=r}
  return{results,best,borrowed:(p.stationsAtMID||0)===0}
}

function sweepStations(p,days=1,maxTotal=6){
  const results=[];
  for(let total=1;total<=maxTotal;total++){
    let best=null;
    for(let lp=0;lp<=total;lp++)for(let mid=0;mid<=total-lp;mid++){
      const dp=total-lp-mid;
      const r=runSim({...p,stationsAtLP:lp,stationsAtMID:mid,stationsAtDP:dp},days);
      const score=r.totTon-r.totDet*p.consLoaded*1000-r.battDenied*100;
      if(!best||score>best.score)best={lp,mid,dp,score,tons:r.totTon,trips:r.totTrips,UA:r.UA,sw:r.totSW,detKm:r.totDet,denied:r.battDenied,sessLP:r.locSum.LP.sessions,sessMID:r.locSum.MID.sessions,sessDP:r.locSum.DP.sessions};
    }
    results.push({total,...best});
  }
  let sweet=results[results.length-1];for(let i=1;i<results.length;i++){const m=results[i-1].tons>0?(results[i].tons-results[i-1].tons)/results[i-1].tons:0;if(m<0.02){sweet=results[i-1];break}}
  let bestOverall=results[0];for(const r of results)if(r.tons>bestOverall.tons)bestOverall=r;
  return{results,sweetSpot:sweet,bestOverall};
}

function fleetStationMatrix(p,days=1,maxDT=18,stationCounts=[1,2,3,4,6,8]){

        <div style={sec}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}><div><h3 style={{fontSize:12,fontWeight:800,color:C.cyan,margin:0}}>📈 Fleet Sizing × Station Count</h3><div style={{fontSize:9,color:C.dim,marginTop:3}}>Iterasi DT count 1..N untuk berbagai jumlah station [1, 2, 3, 4, 6, 8] (all @ DP).</div></div><div style={{display:"flex",gap:6,alignItems:"center"}}><div style={{display:"flex",flexDirection:"column",gap:2,fontSize:10}}><label style={{color:C.dim,fontWeight:600}}>Max DT</label><input type="number" value={fleetMxMaxDT} min={1} max={30} onChange={e=>setFleetMxMaxDT(Math.max(1,Math.min(30,Number(e.target.value)||18)))} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.white,padding:"5px 8px",borderRadius:4,fontFamily:mono,fontSize:11,width:60}}/></div><button onClick={runFleetMx} disabled={fleetMxR} style={{padding:"8px 14px",fontSize:11,fontWeight:800,color:C.bg,background:fleetMxR?"#555":`linear-gradient(135deg,${C.cyan},${C.green})`,border:"none",borderRadius:6,cursor:fleetMxR?"wait":"pointer"}}>{fleetMxR?"⏳":"▶ Run"}</button></div></div>
          {fleetMx&&(()=>{const W=680,H=300,padL=46,padR=20,padT=28,padB=42,cW=W-padL-padR,cH=H-padT-padB;const colors={1:C.cyan,2:C.green,3:C.amber,4:C.red,6:C.purple,8:"#e040fb"};const allVals=[];fleetMx.stationCounts.forEach(sc=>fleetMx.matrix[sc].forEach(d=>allVals.push(d.trips)));const maxV=Math.max(...allVals,1);const niceMax=Math.ceil(maxV/5)*5;return(<div style={{background:C.surface,borderRadius:8,padding:10,overflow:'auto'}}><svg width={W} height={H} style={{display:'block',maxWidth:'100%'}}>{[0,1,2,3,4,5].map(i=>{const y=padT+(cH/5)*i;const v=Math.round(niceMax*(5-i)/5);return(<g key={i}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke={C.border} strokeWidth="0.5"/><text x={padL-4} y={y+3} fill={C.dim} fontSize="9" textAnchor="end" fontFamily={mono}>{v}</text></g>)})}{Array.from({length:fleetMx.maxDT},(_,i)=>i+1).filter(dt=>dt===1||dt===fleetMx.maxDT||dt%Math.max(1,Math.floor(fleetMx.maxDT/15))===0).map(dt=>{const x=padL+((dt-1)/(fleetMx.maxDT-1))*cW;return(<text key={dt} x={x} y={H-padB+14} fill={C.dim} fontSize="9" textAnchor="middle" fontFamily={mono}>{dt}</text>)})}<text x={W/2} y={H-4} fill={C.dim} fontSize="10" textAnchor="middle">DT count</text><text x={padL-32} y={padT-8} fill={C.dim} fontSize="10">Trips</text>{fleetMx.stationCounts.map(sc=>{const data=fleetMx.matrix[sc];const col=colors[sc]||C.white;const pts=data.map((d,i)=>{const x=padL+(i/Math.max(1,fleetMx.maxDT-1))*cW;const y=padT+cH-(d.trips/niceMax)*cH;return`${x.toFixed(1)},${y.toFixed(1)}`}).join(' ');return(<g key={sc}><polyline points={pts} fill="none" stroke={col} strokeWidth="2"/>{data.map((d,i)=>{const x=padL+(i/Math.max(1,fleetMx.maxDT-1))*cW;const y=padT+cH-(d.trips/niceMax)*cH;return(<circle key={i} cx={x} cy={y} r="2.5" fill={col}><title>{`${sc} station · DT=${d.dt} → trips=${d.trips} denied=${d.denied}`}</title></circle>)})}</g>)})}<g transform={`translate(${padL+10},${padT+8})`}>{fleetMx.stationCounts.map((sc,i)=>(<g key={sc} transform={`translate(0,${i*14})`}><line x1="0" y1="5" x2="14" y2="5" stroke={colors[sc]||C.white} strokeWidth="2"/><text x="18" y="9" fill={C.dim} fontSize="10" fontFamily={mono}>{sc} station</text></g>))}</g></svg></div>)})()}
          {!fleetMx&&!fleetMxR&&<div style={{padding:18,textAlign:"center",color:C.dim,fontSize:10,fontStyle:"italic"}}>Klik <strong>▶ Run</strong> untuk fleet sizing matrix. ~{fleetMxMaxDT*6} sim.</div>}
        </div>
      </div>)}

      {tab==="trucks"&&dR&&(<div style={sec}><h3 style={{fontSize:12,fontWeight:800,color:C.cyan,margin:"0 0 8px"}}>🚛 Per-Truck Detail</h3><div style={{overflowX:"auto"}}><table style={{fontFamily:mono,fontSize:9,width:"100%"}}><thead><tr style={{color:C.amber}}><th style={{padding:"6px"}}>DT</th><th style={{padding:"6px",textAlign:"right"}}>Trips</th><th style={{padding:"6px",textAlign:"right"}}>Tons</th><th style={{padding:"6px",textAlign:"right"}}>SOC</th><th style={{padding:"6px",textAlign:"right"}}>Swaps</th><th style={{padding:"6px",textAlign:"right",color:LOC_COLOR.LP}}>@LP</th><th style={{padding:"6px",textAlign:"right",color:LOC_COLOR.MID}}>@MID</th><th style={{padding:"6px",textAlign:"right",color:LOC_COLOR.DP}}>@DP</th><th style={{padding:"6px",textAlign:"right"}}>SwapT</th><th style={{padding:"6px",textAlign:"right"}}>SwapW</th><th style={{padding:"6px",textAlign:"right",color:"#e040fb"}}>BattW</th><th style={{padding:"6px",textAlign:"right",color:C.cyan}}>Detour</th></tr></thead><tbody>{dR.trucks.map(t=>(<tr key={t.id} style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:"4px 6px",color:C.white,fontWeight:700}}>DT-{t.id}</td><td style={{padding:"4px 6px",textAlign:"right"}}>{t.trips}</td><td style={{padding:"4px 6px",textAlign:"right",color:C.green}}>{t.ton}</td><td style={{padding:"4px 6px",textAlign:"right",color:t.soc<p.socMin?C.red:C.amber}}>{t.soc.toFixed(1)}%</td><td style={{padding:"4px 6px",textAlign:"right"}}>{t.swaps}</td><td style={{padding:"4px 6px",textAlign:"right",color:LOC_COLOR.LP}}>{t.swapsByLoc.LP}</td><td style={{padding:"4px 6px",textAlign:"right",color:LOC_COLOR.MID}}>{t.swapsByLoc.MID}</td><td style={{padding:"4px 6px",textAlign:"right",color:LOC_COLOR.DP}}>{t.swapsByLoc.DP}</td><td style={{padding:"4px 6px",textAlign:"right"}}>{t.st.toFixed(0)}</td><td style={{padding:"4px 6px",textAlign:"right",color:C.red}}>{t.sw.toFixed(0)}</td><td style={{padding:"4px 6px",textAlign:"right",color:"#e040fb"}}>{t.bw.toFixed(0)}</td><td style={{padding:"4px 6px",textAlign:"right",color:C.cyan}}>{t.detKm.toFixed(2)}</td></tr>))}</tbody></table></div></div>)}
    </>)}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function(){
  if(window.LocalFS) return; /* already loaded */
  const IDB_NAME='app_fs_v1', IDB_STORE='handles';
  function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)})}
  async function idbGet(k){const db=await idbOpen();return new Promise((res,rej)=>{const r=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
  async function idbSet(k,v){const db=await idbOpen();return new Promise((res,rej)=>{const r=db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(v,k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
  async function idbDel(k){const db=await idbOpen();return new Promise((res,rej)=>{const r=db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
  let dirHandle=null, connected=false;
  const _setItem=localStorage.setItem.bind(localStorage);
  const _removeItem=localStorage.removeItem.bind(localStorage);
  const _clear=localStorage.clear.bind(localStorage);
  function sanitize(n){return n.replace(/[\\/:*?"<>|]/g,'_')}
  function isAppKey(k){return k && (k.startsWith('rc_')||k.startsWith('ev_sim')||k.startsWith('tbe_')||k.startsWith('fm_')||k.startsWith('mp_'))}
  function supported(){return !!window.showDirectoryPicker}
  async function verifyPerm(h){if(!h.queryPermission)return true;if((await h.queryPermission({mode:'readwrite'}))==='granted')return true;return (await h.requestPermission({mode:'readwrite'}))==='granted'}
  async function saveFile(k,v){if(!dirHandle)return;try{const fh=await dirHandle.getFileHandle(sanitize(k)+'.json',{create:true});const w=await fh.createWritable();await w.write(typeof v==='string'?v:JSON.stringify(v,null,2));await w.close()}catch(e){console.warn('LocalFS save',k,e)}}
  async function loadFile(k){if(!dirHandle)return null;try{const fh=await dirHandle.getFileHandle(sanitize(k)+'.json');return await(await fh.getFile()).text()}catch(e){return null}}
  /* Monkey-patch localStorage to mirror app keys to folder */
  localStorage.setItem=function(k,v){_setItem(k,v);if(connected&&isAppKey(k))saveFile(k,v)};
  localStorage.removeItem=function(k){_removeItem(k);if(connected&&isAppKey(k)&&dirHandle){try{dirHandle.removeEntry(sanitize(k)+'.json')}catch(e){}}};
  async function syncFromFolder(){if(!connected||!dirHandle)return 0;let n=0;try{for await(const e of dirHandle.values()){if(e.kind==='file'&&e.name.endsWith('.json')){const k=e.name.replace(/\.json$/,'');if(isAppKey(k)){const t=await(await e.getFile()).text();_setItem(k,t);n++}}}}catch(e){console.error(e)}return n}
  async function uploadAllToFolder(){if(!connected)return 0;let n=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(isAppKey(k)){await saveFile(k,localStorage.getItem(k));n++}}return n}
  async function collectAppFiles(){if(!dirHandle)return[];const out=[];try{for await(const e of dirHandle.values()){if(e.kind==='file'&&e.name.endsWith('.json')){const k=e.name.replace(/\.json$/,'');if(isAppKey(k))out.push(k)}}}catch(e){}return out}
  async function connect(){
    if(!supported()){alert('File System Access tidak didukung. Pakai Chrome/Edge terbaru.');return false}
    try{
      const h=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
      dirHandle=h;await idbSet('dirHandle',h);connected=true;updateUI();
      const files=await collectAppFiles();
      if(files.length>0){
        const ok=confirm(`Folder sudah berisi ${files.length} file aplikasi.\n\nYa  = Load dari folder (REPLACE data browser)\nNo  = Upload data browser saat ini ke folder (merge)`);
        if(ok){await syncFromFolder();location.reload()} else {await uploadAllToFolder()}
      } else {
        const n=await uploadAllToFolder();
        if(n>0) toast(`✅ ${n} data ter-upload ke folder ${h.name}. Permanent now.`);
        else toast(`📂 Folder ${h.name} terhubung. Save berikutnya akan auto-sync.`);
      }
      return true
    }catch(e){if(e.name!=='AbortError')console.error(e);return false}
  }
  async function disconnect(){if(!confirm('Disconnect folder? Data tetap di file, tapi save berikutnya hanya ke browser.'))return;dirHandle=null;connected=false;await idbDel('dirHandle');updateUI();toast('Folder disconnected. Mode: browser only.')}
  async function autoConnect(){if(!supported())return false;try{const h=await idbGet('dirHandle');if(!h)return false;if(await verifyPerm(h)){dirHandle=h;connected=true;updateUI();await syncFromFolder();return true}}catch(e){}return false}
  function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:14px;right:14px;background:#1c1917;color:#fef3c7;padding:10px 16px;border-left:3px solid #84cc16;border-radius:6px;font-size:12px;z-index:99999;box-shadow:0 4px 12px rgba(0,0,0,.5);font-family:system-ui';document.body.appendChild(t);setTimeout(()=>t.remove(),3500)}
  function injectWidget(){
    if(document.getElementById('localfs_widget'))return;
    const d=document.createElement('div');
    d.id='localfs_widget';
    d.style.cssText='position:fixed;top:6px;right:6px;z-index:999998;background:rgba(15,15,15,0.92);backdrop-filter:blur(8px);border:1px solid #3d342a;border-radius:6px;padding:5px 8px;display:flex;gap:6px;align-items:center;font-size:10.5px;font-family:system-ui;color:#fef3c7;box-shadow:0 2px 8px rgba(0,0,0,.4)';
    d.innerHTML='<span id="localfs_status" style="font-weight:700">⚠️ Browser only</span><button id="localfs_btn" style="padding:3px 8px;font-size:10px;font-weight:700;border:none;border-radius:4px;cursor:pointer;background:#0d9488;color:white">🔗 Connect Folder</button>';
    document.body.appendChild(d);
    updateUI();
  }
  function updateUI(){
    const s=document.getElementById('localfs_status');
    if(s){if(connected){s.innerHTML=`📂 <b style="color:#84cc16">${dirHandle?.name||'connected'}</b>`;s.title='Data ter-mirror ke folder lokal. Tidak hilang saat clear cache.'} else {s.innerHTML='⚠️ <b style="color:#f59e0b">Browser only</b>';s.title='Data hanya di browser. Klik Connect Folder untuk save permanent.'}}
    const b=document.getElementById('localfs_btn');
    if(b){b.textContent=connected?'🔌 Disconnect':'🔗 Connect Folder';b.onclick=connected?disconnect:connect;b.style.background=connected?'#dc2626':'#0d9488'}
  }
  window.LocalFS={connect,disconnect,autoConnect,supported,isConnected:()=>connected,folderName:()=>dirHandle?.name||'',uploadAll:uploadAllToFolder,syncFrom:syncFromFolder,updateUI};
  window.addEventListener('DOMContentLoaded',async()=>{injectWidget();await autoConnect()});
})();
</script>
</body></html>
